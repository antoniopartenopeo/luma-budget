name: Quality & Governance Gate

on: [push, pull_request]

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Governance, tests, lint, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run Quality Gate
        run: npm run quality:gate
      - name: Upload Governance Quick Check
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-governance-quick-check
          path: |
            04_execution/reports/generated-governance-quick-check.md
            04_execution/reports/generated-governance-quick-check-summary.env
